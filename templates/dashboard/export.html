{% extends 'base.html' %}

{% block title %}Export Data - Recodu{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">Export Data</div>
    <p class="text-muted mb-lg">Download patient vitals data as a CSV file. Optionally filter by date range.</p>
    <form method="POST">
        {% csrf_token %}
        <div class="grid grid-2">
            <div class="form-group">
                <label class="form-label">Start Date</label>
                <input type="date" name="start_date" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">End Date</label>
                <input type="date" name="end_date" class="form-input">
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Download CSV</button>
    </form>
</div>
{% endblock %}
